name: test

on:
  push:
    branches:
      - "*"
  pull_request:

jobs:
  python-3_12:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          # The list of all available versions can be found here:
          # https://raw.githubusercontent.com/actions/python-versions/main/versions-manifest.json
          python-version: "3.12"
          pip-install: -r requirements-dev.txt

      - run: python -m pytest

  python-3_6:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PythonVersion: "3.6.0"
    steps:
      - uses: actions/checkout@v6

      - name: Download and install Python
        run: |
          $ErrorActionPreference = 'Stop'

          $Version = $env:PythonVersion
          $PythonExecName = "python-$Version-amd64.exe"

          mkdir "$env:TEMP\setup-python-$Version"
          cd "$env:TEMP\setup-python-$Version"

          Write-Host "Download setup.ps1"
          Invoke-WebRequest -OutFile setup.ps1 -Uri https://gist.githubusercontent.com/bddjr/f91d807fa74c1d7237ef8ccdb7d5b595/raw/c8011c954d8f943844830d9bcbf7eb4835b56364/actions-setup-python.ps1

          Write-Host "Run setup.ps1"
          .\setup.ps1 -Architecture x64 -HardwareArchitecture x64 -Version $Version -PythonExecName $PythonExecName

      # - name: Check Python Version
      #   run: |
      #     $ErrorActionPreference = 'Stop'
      #     Write-Host "$env:PATH"
      #     python -c "from sys import version as v;v=v[:v.index(' ')];print('Python',v);exit(1-(v=='$env:PythonVersion'))"

      - run: python -m pip install -r requirements-dev.txt

      - run: python -m pytest
